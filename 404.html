<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: linear-gradient(135deg, #14315A 0%, #1B3F6E 55%, #2C6FBF 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;

    .box { max-width: 560px; }

    }
    p { color: rgba(255,255,255,0.7); margin-bottom: 26px; }
    .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    a.btn {
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      text-decoration: none;
      border-radius: 999px;
      padding: 13px 26px;
      color: #fff;
    }
    .primary { background: #fff; color: #1B3F6E; }
    .primary:hover { background: #E8EEF7; }
    .ghost { border: 2px solid rgba(255,255,255,0.4); }
    .ghost:hover { border-color: #fff; }
